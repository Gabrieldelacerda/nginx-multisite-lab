server {
    listen 80;
    server_name site2.local;

    root /var/www/site2;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name site2.local;

    root /var/www/site2;
    index index.html;

    ssl_certificate     /etc/nginx/certs/site2.crt;
    ssl_certificate_key /etc/nginx/certs/site2.key;

    location / {
        try_files $uri $uri/ =404;
    }
}
